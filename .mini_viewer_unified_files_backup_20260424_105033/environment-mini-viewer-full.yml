name: mini-viewer
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - pip>=24
  - git
  - ffmpeg
  - pip:
      # CUDA-capable PyTorch build. This env can still run CPU code with --device cpu.
      - --index-url https://download.pytorch.org/whl/cu124
      - --extra-index-url https://pypi.org/simple
      - --extra-index-url https://docs.gsplat.studio/whl/pt24cu124
      - torch==2.4.1
      - torchvision==0.19.1
      # CUDA rasterization backend. The app should lazy-import this and fall back to torch on CPU.
      - gsplat==1.5.3+pt24cu124
      # Core viewer / data / rendering dependencies.
      - numpy>=1.26,<2.3
      - plyfile>=1.0
      - pillow>=10.0
      - imageio[ffmpeg]>=2.34
      - matplotlib>=3.8
      - scikit-learn>=1.4
      - opencv-python>=4.9
      - viser>=1.0.15,<2
      - nerfview>=0.1.3
      - packaging>=24
      # Language feature querying. Loaded lazily in the patched code.
      - open-clip-torch>=2.24
      - transformers>=4.49,<5
      - sentencepiece>=0.2
      - safetensors>=0.4
